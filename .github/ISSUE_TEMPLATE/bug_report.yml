name: Bug Report
description: Report a bug in CentricMem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: version
    attributes:
      label: Environment
      description: centricmem version, OS, Node version
    validations:
      required: true
